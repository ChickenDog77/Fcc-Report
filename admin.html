<style>
@import url('https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1a2751;--navy-mid:#243260;--cyan:#28c8f0;--cyan-light:#e0f7fd;
  --cream:#f8f9fc;--white:#fff;--gray:#6b7280;--border:#e2e8f0;
  --green:#2d7a4f;--green-bg:#dcf5e7;--orange:#d97706;--orange-bg:#fef3c7;
}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--navy);min-height:100vh}
.checking-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--navy)}
.checking-screen p{color:white;font-size:1rem;opacity:0.7}
.login-screen{display:none;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:var(--navy)}
.login-card{background:white;border-radius:20px;padding:40px 36px;text-align:center;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.login-card img{height:90px;margin-bottom:20px}
.login-card h1{font-family:'Lora',serif;font-size:1.2rem;color:var(--navy);margin-bottom:6px}
.login-card p{color:var(--gray);font-size:0.85rem;margin-bottom:24px;line-height:1.5}
.email-input{width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.95rem;outline:none;transition:border-color 0.15s;margin-bottom:12px;color:var(--navy)}
.email-input:focus{border-color:var(--navy)}
.magic-btn{width:100%;padding:14px;background:var(--navy);color:white;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:600;cursor:pointer;transition:all 0.15s}
.magic-btn:hover{background:var(--navy-mid)}
.magic-btn:disabled{opacity:0.5;cursor:not-allowed}
.login-msg{margin-top:14px;font-size:0.83rem;min-height:20px}
.login-msg.success{color:var(--green)}
.login-msg.error{color:#c0392b}
.dashboard{display:none;min-height:100vh}
.topbar{background:var(--navy);border-bottom:3px solid var(--cyan);padding:14px 32px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
.topbar img{height:40px}
.topbar-sub{color:var(--cyan);font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;margin-top:2px}
.topbar-title{color:white;font-family:'Lora',serif;font-size:1rem}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.user-badge{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.85);padding:6px 12px;border-radius:20px;font-size:0.78rem}
.refresh-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white;padding:8px 14px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.82rem;transition:all 0.15s}
.refresh-btn:hover{background:rgba(255,255,255,0.2)}
.logout-btn{background:none;border:none;color:rgba(255,255,255,0.45);font-size:0.8rem;cursor:pointer;font-family:'DM Sans',sans-serif}
.logout-btn:hover{color:white}
.content{max-width:1000px;margin:0 auto;padding:32px 24px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:32px}
.stat-card{background:white;border:1px solid var(--border);border-radius:12px;padding:20px 24px;text-align:center}
.stat-num{font-family:'Lora',serif;font-size:2.2rem;font-weight:700;color:var(--navy);line-height:1}
.stat-label{font-size:0.75rem;color:var(--gray);text-transform:uppercase;letter-spacing:0.08em;margin-top:6px}
.stat-card.open .stat-num{color:var(--orange)}
.stat-card.resolved .stat-num{color:var(--green)}
.tabs{display:flex;gap:4px;margin-bottom:24px;background:white;border:1px solid var(--border);border-radius:10px;padding:4px;width:fit-content;flex-wrap:wrap}
.tab{padding:8px 18px;border-radius:7px;font-size:0.88rem;font-weight:500;cursor:pointer;border:none;background:none;font-family:'DM Sans',sans-serif;color:var(--gray);transition:all 0.15s}
.tab.active{background:var(--navy);color:white}
.toolbar{display:flex;gap:12px;margin-bottom:20px;align-items:center;flex-wrap:wrap}
.search-input{flex:1;min-width:200px;padding:9px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;background:white;transition:border-color 0.15s}
.search-input:focus{border-color:var(--navy)}
.filter-select{padding:9px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.88rem;color:var(--navy);background:white;outline:none;cursor:pointer}
.reports-list{display:flex;flex-direction:column;gap:12px}
.report-card{background:white;border:1px solid var(--border);border-radius:12px;padding:20px 24px;transition:box-shadow 0.15s;animation:slideIn 0.2s ease}
.report-card:hover{box-shadow:0 4px 16px rgba(26,39,81,0.08)}
.report-card.resolved{opacity:0.65}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}
.card-location{font-family:'Lora',serif;font-size:1rem;font-weight:600;color:var(--navy)}
.card-time{font-size:0.75rem;color:var(--gray);margin-top:3px}
.card-badge{padding:4px 10px;border-radius:20px;font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;white-space:nowrap}
.badge-open{background:var(--orange-bg);color:var(--orange)}
.badge-resolved{background:var(--green-bg);color:var(--green)}
.card-items{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.item-tag{background:var(--cream);border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-size:0.8rem;color:var(--navy)}
.card-notes{font-size:0.85rem;color:var(--gray);font-style:italic;padding:8px 12px;background:var(--cyan-light);border-radius:6px;margin-bottom:10px;border-left:3px solid var(--cyan)}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.resolved-time{font-size:0.75rem;color:var(--green)}
.resolve-btn{padding:8px 18px;background:var(--navy);color:white;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.82rem;font-weight:600;cursor:pointer;transition:all 0.15s}
.resolve-btn:hover{background:var(--navy-mid)}
.resolve-btn:disabled{opacity:0.5;cursor:not-allowed}
.empty-state{text-align:center;padding:60px 20px;color:var(--gray)}
.empty-state .icon{font-size:2.5rem;margin-bottom:12px}
.loading{text-align:center;padding:60px;color:var(--gray)}
@keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.qr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px}
.qr-card{background:white;border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center;transition:box-shadow 0.15s}
.qr-card:hover{box-shadow:0 4px 16px rgba(26,39,81,0.1)}
.qr-card img{width:140px;height:140px;display:block;margin:0 auto 12px}
.qr-card-name{font-family:'Lora',serif;font-size:0.88rem;font-weight:600;color:var(--navy);margin-bottom:4px;line-height:1.3}
.qr-card-url{font-size:0.68rem;color:var(--gray);font-family:monospace;margin-bottom:12px;word-break:break-all}
.qr-download-btn{display:inline-block;padding:7px 16px;background:var(--navy);color:white;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.8rem;font-weight:600;cursor:pointer;text-decoration:none;transition:background 0.15s}
.qr-download-btn:hover{background:var(--navy-mid)}
.qr-print-btn{width:100%;padding:12px;background:white;border:1.5px solid var(--navy);color:var(--navy);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:600;cursor:pointer;margin-bottom:20px;transition:all 0.15s}
.qr-print-btn:hover{background:var(--navy);color:white}
.users-list{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.user-row{background:white;border:1px solid var(--border);border-radius:10px;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.user-info{display:flex;flex-direction:column}
.user-name{font-weight:600;font-size:0.95rem;color:var(--navy)}
.user-email{font-size:0.8rem;color:var(--gray)}
.user-remove-btn{padding:6px 14px;border:1.5px solid #fca5a5;background:white;color:#c0392b;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.8rem;cursor:pointer;transition:all 0.15s}
.user-remove-btn:hover{background:#fef2f2}
.add-user-form{background:white;border:1px solid var(--border);border-radius:12px;padding:24px}
.add-user-form h3{font-family:'Lora',serif;font-size:1rem;color:var(--navy);margin-bottom:16px}
.form-row{display:flex;gap:10px;flex-wrap:wrap}
.form-input{flex:1;min-width:160px;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.15s}
.form-input:focus{border-color:var(--navy)}
.add-user-btn{padding:10px 20px;background:var(--navy);color:white;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:600;cursor:pointer;transition:background 0.15s}
.add-user-btn:hover{background:var(--navy-mid)}
.form-msg{margin-top:10px;font-size:0.82rem;min-height:18px}
.form-msg.success{color:var(--green)}
.form-msg.error{color:#c0392b}
</style>
</head>

<script>
const MAGIC_URL   = 'https://chickendog.app.n8n.cloud/webhook/fcc-admin-magic-link';
const VERIFY_URL  = 'https://chickendog.app.n8n.cloud/webhook/fcc-admin-verify-token';

let allReports = [], currentTab = 'open', currentUser = null;

async function init() {
  const params = new URLSearchParams(window.location.search);
  const urlToken = params.get('token');
  if (urlToken) {
    localStorage.setItem('fcc_admin_token', urlToken);
    window.history.replaceState({}, '', window.location.pathname);
  }
  const token = localStorage.getItem('fcc_admin_token');
  if (!token) { showLogin(); return; }
  try {
    const res = await fetch(VERIFY_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({token})
    });
    const data = await res.json();
    if (data.valid) { currentUser = data; showDashboard(); }
    else { localStorage.removeItem('fcc_admin_token'); showLogin(); }
  } catch(e) { localStorage.removeItem('fcc_admin_token'); showLogin(); }
}

function showLogin() {
  document.getElementById('checkingScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}

function showDashboard() {
  document.getElementById('checkingScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('userBadge').textContent = currentUser.name || currentUser.email;
  loadReports();
}

async function sendMagicLink() {
  const email = document.getElementById('emailInput').value.trim();
  const msg = document.getElementById('loginMsg');
  const btn = document.getElementById('magicBtn');
  if (!email) { msg.textContent = 'Please enter your email.'; msg.className = 'login-msg error'; return; }
  btn.disabled = true; btn.textContent = 'Sending...';
  msg.textContent = ''; msg.className = 'login-msg';
  try {
    const res = await fetch(MAGIC_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email})
    });
    // Respond immediately mode returns 200 on success regardless of body
    if (res.ok) {
      msg.textContent = '\u2713 Magic link sent! Check your email.';
      msg.className = 'login-msg success';
      btn.textContent = 'Link Sent';
    } else {
      msg.textContent = "That email isn't authorized. Contact Ben to get access.";
      msg.className = 'login-msg error';
      btn.disabled = false; btn.textContent = 'Send Magic Link';
    }
  } catch(e) {
    msg.textContent = 'Something went wrong. Try again.';
    msg.className = 'login-msg error';
    btn.disabled = false; btn.textContent = 'Send Magic Link';
  }
}

function logout() {
  localStorage.removeItem('fcc_admin_token');
  currentUser = null;
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('emailInput').value = '';
  document.getElementById('loginMsg').textContent = '';
  document.getElementById('magicBtn').disabled = false;
  document.getElementById('magicBtn').textContent = 'Send Magic Link';
  showLogin();
}

async function loadReports() {
  document.getElementById('reportsList').innerHTML = '<div class="loading">Loading reports...</div>';
  try {
    const res = await fetch(DATA_URL);
    const data = await res.json();
    allReports = Array.isArray(data) ? data : [];
    updateStats(); populateLocationFilter(); renderReports();
  } catch(err) {
    document.getElementById('reportsList').innerHTML = '<div class="empty-state"><div class="icon">\u26A0\uFE0F</div><p>Could not load reports.</p></div>';
  }
}

function updateStats() {
  const open = allReports.filter(r => r.status === 'open').length;
  const res  = allReports.filter(r => r.status === 'resolved').length;
  document.getElementById('statTotal').textContent    = allReports.length;
  document.getElementById('statOpen').textContent     = open;
  document.getElementById('statResolved').textContent = res;
}

function populateLocationFilter() {
  const locs = [...new Set(allReports.map(r => r.location_name))].sort();
  const sel = document.getElementById('locationFilter');
  const cur = sel.value;
  sel.innerHTML = '<option value="">All Locations</option>' +
    locs.map(l => '<option value="' + l + '"' + (l === cur ? ' selected' : '') + '>' + l + '</option>').join('');
}

function switchTab(tab) {
  currentTab = tab;
  ['open','resolved','all','qr','users'].forEach(t => {
    const id = 'tab' + t.charAt(0).toUpperCase() + t.slice(1);
    const el = document.getElementById(id);
    if (el) el.classList.toggle('active', t === tab);
  });
  const isSpecial = tab === 'qr' || tab === 'users';
  document.getElementById('qrPanel').style.display     = tab === 'qr'    ? 'block' : 'none';
  document.getElementById('usersPanel').style.display  = tab === 'users' ? 'block' : 'none';
  document.getElementById('reportsList').style.display = isSpecial ? 'none' : 'block';
  document.getElementById('toolbar').style.display     = isSpecial ? 'none' : 'flex';
  if (tab === 'qr') renderQRPanel();
  else if (tab === 'users') renderUsersPanel();
  else renderReports();
}

function renderReports() {
  const search    = document.getElementById('searchInput').value.toLowerCase();
  const locFilter = document.getElementById('locationFilter').value;
  let filtered = allReports.filter(r => {
    if (currentTab === 'open'     && r.status !== 'open')     return false;
    if (currentTab === 'resolved' && r.status !== 'resolved') return false;
    if (locFilter && r.location_name !== locFilter)           return false;
    if (search) {
      const hay = (r.location_name + ' ' + (r.items_needed||[]).join(' ') + ' ' + (r.notes||'')).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });
  const list = document.getElementById('reportsList');
  if (!filtered.length) {
    const icon = currentTab === 'open' ? '\uD83C\uDF89' : '\uD83D\uDCCB';
    const msg  = currentTab === 'open' ? 'No open reports \u2014 all caught up!' : 'No reports found.';
    list.innerHTML = '<div class="empty-state"><div class="icon">' + icon + '</div><p>' + msg + '</p></div>';
    return;
  }
  list.innerHTML = '<div class="reports-list">' + filtered.map(r => reportCard(r)).join('') + '</div>';
}

function fmt(ts) {
  return new Date(ts).toLocaleString('en-US',{timeZone:'America/New_York',month:'short',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true});
}

function reportCard(r) {
  const items  = (r.items_needed||[]).map(i => '<span class="item-tag">' + i + '</span>').join('');
  const notes  = r.notes ? '<div class="card-notes">' + r.notes + '</div>' : '';
  const badge  = r.status === 'open'
    ? '<span class="card-badge badge-open">Open</span>'
    : '<span class="card-badge badge-resolved">\u2713 Resolved</span>';
  const footer = r.status === 'open'
    ? '<button class="resolve-btn" data-id="' + r.id + '" onclick="resolveReport(this.dataset.id)">&#x2713; Mark Resolved</button>'
    : '<span class="resolved-time">Resolved ' + (r.resolved_at ? fmt(r.resolved_at) : '') + '</span>';
  return '<div class="report-card ' + r.status + '" id="card-' + r.id + '">' +
    '<div class="card-header"><div><div class="card-location">' + r.location_name + '</div>' +
    '<div class="card-time">' + fmt(r.created_at) + '</div></div>' + badge + '</div>' +
    '<div class="card-items">' + items + '</div>' + notes +
    '<div class="card-footer"><span style="font-size:0.75rem;color:var(--gray)">#' + r.id.slice(0,8) + '</span>' + footer + '</div></div>';
}

async function resolveReport(id) {
  const btn = document.getElementById('btn-' + id);
  btn.disabled = true; btn.textContent = 'Resolving...';
  try {
    await fetch(RESOLVE_URL + '?id=' + id);
    const r = allReports.find(r => r.id === id);
    if (r) { r.status = 'resolved'; r.resolved_at = new Date().toISOString(); }
    updateStats(); renderReports();
  } catch(err) { btn.disabled = false; btn.textContent = '\u2713 Mark Resolved'; }
}

const QR_LOCS = [
  {id:'mens-bathroom-foyer',       name:"Men's Bathroom (Foyer Side)"},
  {id:'womens-bathroom-foyer',     name:"Women's Bathroom (Foyer Side)"},
  {id:'mens-bathroom-education',   name:"Men's Bathroom (Education Side)"},
  {id:'womens-bathroom-education', name:"Women's Bathroom (Education Side)"},
  {id:'baptistry-bathroom',        name:'Baptistry Bathroom'},
  {id:'nursery-preschool-bathroom',name:'Nursery & Preschool Bathroom'},
  {id:'preschool-bathroom',        name:'Preschool Bathroom'},
  {id:'mens-foyer-supply-closet',  name:"Men's Foyer Supply Closet"},
  {id:'education-supply-closet',   name:'Education Supply Closet'},
  {id:'communion-prep',            name:'Communion Prep Area'},
  {id:'kitchen',                   name:'Kitchen'},
  {id:'coffee-area',               name:'Coffee Area'},
];

function qrImg(id, size) {
  return 'https://api.qrserver.com/v1/create-qr-code/?size=' + size + 'x' + size + '&color=1a2751&data=' + encodeURIComponent('https://supplies.farragutcc.com?loc=' + id);
}

function renderQRPanel() {
  const panel = document.getElementById('qrPanel');
  panel.innerHTML = '<button class="qr-print-btn" onclick="window.print()">\uD83D\uDDA8\uFE0F Print All QR Codes</button><div class="qr-grid">' +
    QR_LOCS.map(loc =>
      '<div class="qr-card">' +
      '<img src="' + qrImg(loc.id,200) + '" alt="QR" loading="lazy">' +
      '<div class="qr-card-name">' + loc.name + '</div>' +
      '<div class="qr-card-url">supplies.farragutcc.com?loc=' + loc.id + '</div>' +
      '<a class="qr-download-btn" href="' + qrImg(loc.id,400) + '" download="' + loc.id + '-qr.png" target="_blank">\u2B07 Download</a>' +
      '</div>'
    ).join('') + '</div>';
}

async function renderUsersPanel() {
  const panel = document.getElementById('usersPanel');
  panel.innerHTML = '<div class="loading">Loading users...</div>';
  try {
    const res = await fetch(SB_URL + '/rest/v1/admin_users?select=*&order=created_at.asc', {
      headers: {'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY}
    });
    const users = await res.json();
    const rows = users.map(u =>
      '<div class="user-row"><div class="user-info">' +
      '<span class="user-name">' + u.name + '</span>' +
      '<span class="user-email">' + u.email + '</span></div>' +
      (u.email !== currentUser.email
        ? '<button class="user-remove-btn" data-id="' + u.id + '" data-name="' + u.name + '" onclick="removeUser(this.dataset.id, this.dataset.name)">Remove</button>'
        : '<span style="font-size:0.75rem;color:var(--gray)">You</span>') +
      '</div>'
    ).join('');
    panel.innerHTML = '<div class="users-list">' + rows + '</div>' +
      '<div class="add-user-form"><h3>Add Admin User</h3>' +
      '<div class="form-row">' +
      '<input class="form-input" id="newName" placeholder="Full name">' +
      '<input class="form-input" id="newEmail" type="email" placeholder="email@example.com">' +
      '<button class="add-user-btn" onclick="addUser()">Add</button></div>' +
      '<div class="form-msg" id="formMsg"></div></div>';
  } catch(e) {
    panel.innerHTML = '<div class="empty-state"><div class="icon">\u26A0\uFE0F</div><p>Could not load users.</p></div>';
  }
}

async function addUser() {
  const name  = document.getElementById('newName').value.trim();
  const email = document.getElementById('newEmail').value.trim().toLowerCase();
  const msg   = document.getElementById('formMsg');
  if (!name || !email) { msg.textContent = 'Name and email are required.'; msg.className = 'form-msg error'; return; }
  try {
    const res = await fetch(SB_URL + '/rest/v1/admin_users', {
      method: 'POST',
      headers: {'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal'},
      body: JSON.stringify({name, email})
    });
    if (res.ok) { msg.textContent = '\u2713 ' + name + ' added!'; msg.className = 'form-msg success'; renderUsersPanel(); }
    else { msg.textContent = 'That email may already be in the list.'; msg.className = 'form-msg error'; }
  } catch(e) { msg.textContent = 'Something went wrong.'; msg.className = 'form-msg error'; }
}

async function removeUser(id, name) {
  if (!confirm('Remove ' + name + ' from admin access?')) return;
  try {
    await fetch(SB_URL + '/rest/v1/admin_users?id=eq.' + id, {
      method: 'DELETE',
      headers: {'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY}
    });
    renderUsersPanel();
  } catch(e) { alert('Could not remove user.'); }
}

document.getElementById('emailInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendMagicLink();
});

init();
</script>
</body>
</html>
